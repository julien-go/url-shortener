name: CI (Frontend)

on:
  pull_request:
    paths:
      - "apps/frontend/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/**"

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend - quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter ./apps/frontend lint

      - name: Typecheck
        run: pnpm --filter ./apps/frontend typecheck

      - name: Test
        run: pnpm --filter ./apps/frontend test

      - name: Build
        run: pnpm --filter ./apps/frontend build
